<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact us| Santos Painting</title>

    <!-- Shared styles -->
    <link rel="stylesheet" href="../css/shared/style.css" />
    <link rel="stylesheet" href="../css/shared/navbar.css" />
    <!-- Page-specific styles -->
    <link rel="stylesheet" href="../css/pages/interior-painting.css" />
  </head>
  <body>

    <!-- Navbar injected by components.js -->
    <div id="navbar-placeholder"></div>

    <main>
      <!-- Contact us page -->
    <section class="contact" id="contact">
        <div class="container">
          <h2>Get a Free Estimate</h2>
          <p>Ready to start your project? Reach out and we'll get back to you promptly.</p>
          <form class="contact-form">
            <input type="text" name="name" placeholder="Your Name" required />
            <input type="email" name="email" placeholder="Email Address" required />
            <input type="tel" name="phone" placeholder="Phone Number" />
            <textarea name="message" rows="4" placeholder="Tell us about your project"></textarea>
            <button type="submit" class="btn-primary">Send Message</button>
          </form>
        </div>
      </section>

    </main>

    <!-- Footer injected by components.js -->
    <div id="footer-placeholder"></div>

    <script src="../js/shared/navbar.js"></script>
    <script src="../js/shared/components.js"></script>
    <script src="../js/shared/main.js"></script>
  </body>
</html>
