<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact us| Santos Painting</title>

    <!-- Shared styles -->
    <link rel="stylesheet" href="../css/shared/style.css" />
    <link rel="stylesheet" href="../css/shared/navbar.css" />
    <link rel="stylesheet" href="../css/shared/footer.css" />
    <!-- Page-specific styles -->
    <link rel="stylesheet" href="../css/pages/contact.css" />
    <link rel="stylesheet" href="../css/shared/animations.css" />
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />
  </head>
  <body>

    <!-- Navbar injected by components.js -->
    <div id="navbar-placeholder"></div>

    <main>

      <!-- Hero -->
      <section class="service-hero">
        <div class="hero-inner">
          <a href="../index.html" class="hero-logo-link">
            <img src="../assets/images/Santos-Painting-Logo.png" alt="Santos Painting" />
          </a>
          <div class="hero-content">
            <h1>Contact Us</h1>
            <p class="hero-subtitle">
              Ready to start your project? Reach out and we'll get back to you promptly.
            </p>
            <a href="#contact" class="btn-primary">Get a Free Estimate</a>
          </div>
        </div>
      </section>

      <!-- Contact us page -->
    <section class="contact" id="contact">
        <div class="container">
          <h2 data-aos="fade-up">Get a Free Estimate</h2>
          <form class="contact-form" data-aos="fade-up" data-aos-delay="200">
            <input type="text" name="name" placeholder="Your Name" required />
            <input type="email" name="email" placeholder="Email Address" required />
            <input type="tel" name="phone" placeholder="Phone Number" />
            <textarea name="message" rows="4" placeholder="Tell us about your project"></textarea>
            <button type="submit" class="btn-primary">Send Message</button>
          </form>
        </div>
      </section>

    </main>

    <!-- Footer injected by components.js -->
    <div id="footer-placeholder"></div>

    <script src="../js/shared/navbar.js"></script>
    <script src="../js/shared/components.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="../js/shared/main.js"></script>
  </body>
</html>
