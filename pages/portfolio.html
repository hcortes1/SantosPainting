    <div class="pagination">
        <button id="prev-btn" class="page-btn" onclick="renderPage(currentPage - 1)">«</button>
        <span id="page-numbers"></span>
        <button id="next-btn" class="page-btn" onclick="renderPage(currentPage + 1)">»</button>
    </div>

    <script>
          const imagesPerPage = 9;
          let currentPage = 1;
          let currentCategory = 'all';

          function getFilteredImages() {
              const all = Array.from(document.querySelectorAll('#gallery img'));
              if (currentCategory === 'all') return all;
              return all.filter(img => img.dataset.category === currentCategory);
          }

          function renderPage(page) {
              currentPage = page;
              const filtered = getFilteredImages();
              const total = Math.ceil(filtered.length / imagesPerPage);
              const start = (page - 1) * imagesPerPage;
              const end = start + imagesPerPage;

              document.querySelectorAll('#gallery img').forEach(img => {
                  img.style.display = 'none';
              });

              filtered.slice(start, end).forEach(img => {
                  img.style.display = 'block';
              });

              const pageList = document.getElementById('page-numbers');
              pageList.innerHTML = '';
              for (let i = 1; i <= total; i++) {
                  const btn = document.createElement('button');
                  btn.textContent = i;
                  btn.className = 'page-btn' + (i === page ? ' active' : '');
                  btn.onclick = () => renderPage(i);
                  pageList.appendChild(btn);
              }

              document.getElementById('prev-btn').disabled = page === 1;
              document.getElementById('next-btn').disabled = page === total;
          }

          function filterGallery(category, clickedBtn) {
              currentCategory = category;
              document.querySelectorAll('.filter-btn').forEach(btn => {
                  btn.classList.remove('active');
              });
              clickedBtn.classList.add('active');
              renderPage(1);
          }

          function onClick(element) {
              document.getElementById("img01").src = element.src;
              document.getElementById("modal01").style.display = "block";
              document.getElementById("caption").innerHTML = element.alt;
          }
          document.addEventListener('DOMContentLoaded', () => renderPage(1));
    </script>
